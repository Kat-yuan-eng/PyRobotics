name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.9", "3.11", "3.13"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/requirements.txt
          pip install pytest ruff mypy

      - name: Regenerate Protobuf
        run: |
          python -m grpc_tools.protoc -I=proto --python_out=generated proto/common.proto proto/control.proto proto/perception.proto proto/decision.proto proto/system.proto proto/agent.proto

      - name: Lint with ruff
        run: ruff check . --exclude generated

      - name: Type check with mypy
        run: mypy --ignore-missing-imports --exclude generated/ .
        continue-on-error: true

      - name: Run tests
        run: python tests/test_all_modules.py
